global:
  networkPolicies:
    enabled: true

controller:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # Esto arregla lo de los puertos que Popeye criticaba
  containerPort: 8082
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8082
    initialDelaySeconds: 10
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8082

server:
  # Quitamos el --insecure porque queremos TLS de punta a punta o bien manejado
  extraArgs: 
    - --ingress-tls-passthrough # Esto permite que Argo maneje su propio SSL tras Traefik
  
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.local
    annotations:
      # Dile a Traefik que use HTTPS hacia el backend
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      # Si usas certificados auto-firmados (muy común en empresas)
      traefik.ingress.kubernetes.io/service.serversscheme: https
    paths:
      - /
    pathType: Prefix
    https: true # Ahora sí, puerto 443 al backend

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

