global:
  networkPolicies:
    enabled: true

controller:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # Esto arregla lo de los puertos que Popeye criticaba
  containerPort: 8082
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8082
    initialDelaySeconds: 10
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8082

server:
  # Quitamos el --insecure porque queremos TLS de punta a punta o bien manejado
  extraArgs:
    - --insecure 
 
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.local
    annotations:
      # Dile a Traefik que use HTTPS hacia el backend
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    paths:
      - /
    pathType: Prefix
    servicePort: http
    https: false # traefik (443) -> argo (80)

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

